<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Zottelli Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (_u && sessionStorage.getItem('sessionToken')) window.location.href = '/index.html';
    </script>
    <style>
        body { justify-content: center; align-items: center; min-height: 100vh; display: flex; background: var(--bg); }
        .login-container { width: 100%; max-width: 420px; padding: 16px; }
        .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 40px; }
        .logo-title { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; color: var(--text); text-align: center; margin-bottom: 4px; }
        .logo-sub { color: var(--muted); text-align: center; font-size: 0.8rem; margin-bottom: 32px; }
        .panel-tabs { display:flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .panel-tab { flex:1; padding: 10px; text-align:center; cursor:pointer; font-size:0.85rem; color:var(--muted); border-bottom: 2px solid transparent; }
        .panel-tab.active { color:var(--accent); border-bottom: 2px solid var(--accent); }
        .alert-zt { padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; margin-top: 12px; }
        .alert-zt.success { background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.3); color: var(--success); }
        .alert-zt.danger  { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3);  color: var(--danger); }
        .alert-zt.warning { background: rgba(210,153,34,0.12); border: 1px solid rgba(210,153,34,0.3); color: var(--warning); }
        .alert-zt.info    { background: rgba(88,166,255,0.1);  border: 1px solid rgba(88,166,255,0.3); color: var(--accent); }

        .ultimo-login {
            background: rgba(212,175,55,.08); border: 1px solid rgba(212,175,55,.2);
            border-radius: 8px; padding: 12px 14px; font-size: 0.75rem; color: var(--muted);
            margin-bottom: 20px; display: none;
        }
        .ultimo-login strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 0.8rem; }
        .ultimo-login .ul-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; }
        .ul-row i { color: rgba(212,175,55,.7); flex-shrink: 0; margin-top: 1px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-title">ZOTTELLI SELECTION</div>
            <div class="logo-sub">Sistema de Gestão de Frota</div>

            <!-- Último login info (preenchido após login) -->
            <div class="ultimo-login" id="ultimo-login-box">
                <strong>🔐 Último acesso registrado</strong>
                <div class="ul-row"><i class="bi bi-clock"></i><span id="ul-data">—</span></div>
                <div class="ul-row"><i class="bi bi-geo-alt"></i><span id="ul-ip">—</span></div>
                <div class="ul-row"><i class="bi bi-display"></i><span id="ul-ua">—</span></div>
            </div>

            <div class="panel-tabs">
                <div class="panel-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</div>
                <div class="panel-tab" id="tabRegistro" onclick="switchTab('registro')">Solicitar Acesso</div>
            </div>

            <!-- Login -->
            <div id="panelLogin">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" id="loginUser" class="form-control" placeholder="seu.usuario" autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div id="loginMsg"></div>
                <button class="btn btn-primary w-100 mt-2" id="btnLogin" onclick="fazerLogin()">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
                <div class="text-center mt-3">
                    <a href="site.html" class="text-decoration-none small text-muted hover-gold">
                        <i class="bi bi-arrow-left me-1"></i>Voltar ao Site
                    </a>
                </div>
            </div>

            <!-- Registro -->
            <div id="panelRegistro" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">Usuário desejado</label>
                    <input type="text" id="regUser" class="form-control" placeholder="nome.sobrenome">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="regPass" class="form-control" placeholder="••••••••">
                </div>
                <div id="registroMsg"></div>
                <button class="btn btn-outline-primary w-100 mt-2" onclick="solicitarAcesso()">
                    <i class="bi bi-send me-2"></i>Solicitar Acesso
                </button>
                <p class="text-center mt-3" style="font-size:0.78rem;color:var(--muted)">Após o envio, aguarde aprovação do administrador.</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('panelLogin').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('panelRegistro').style.display = tab === 'registro' ? '' : 'none';
            document.getElementById('tabLogin').className = 'panel-tab' + (tab === 'login' ? ' active' : '');
            document.getElementById('tabRegistro').className = 'panel-tab' + (tab === 'registro' ? ' active' : '');
        }

        function showMsg(id, msg, tipo) {
            document.getElementById(id).innerHTML = `<div class="alert-zt ${tipo}">${msg}</div>`;
        }

        function parseUA(ua) {
            if (!ua) return 'Navegador desconhecido';
            if (ua.includes('Chrome')) return 'Google Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Edge')) return 'Microsoft Edge';
            return ua.substring(0, 60);
        }

        function mostrarUltimoLogin(data) {
            if (!data) return;
            const box = document.getElementById('ultimo-login-box');
            box.style.display = 'block';
            const dt = new Date(data.em);
            const dtStr = isNaN(dt) ? data.em : dt.toLocaleString('pt-BR');
            document.getElementById('ul-data').textContent = dtStr;
            document.getElementById('ul-ip').textContent = data.ip || 'IP desconhecido';
            document.getElementById('ul-ua').textContent = parseUA(data.ua);
        }

        async function fazerLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            if (!username || !password) return showMsg('loginMsg', 'Preencha todos os campos.', 'warning');

            const btn = document.getElementById('btnLogin');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (res.ok) {
                    // Salva sessão
                    sessionStorage.setItem('usuarioLogado', JSON.stringify(data.user));
                    sessionStorage.setItem('sessionToken', data.token);

                    // Mostra último login brevemente antes de redirecionar
                    if (data.ultimoLogin) {
                        mostrarUltimoLogin(data.ultimoLogin);
                        setTimeout(() => window.location.href = '/index.html', 2200);
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    showMsg('loginMsg', data.erro || 'Erro ao efetuar login.', 'danger');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
                }
            } catch(e) {
                showMsg('loginMsg', 'Erro de conexão com o servidor.', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Entrar';
            }
        }

        async function solicitarAcesso() {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            if (!username || !password) return showMsg('registroMsg', 'Preencha todos os campos.', 'warning');
            const res = await fetch('/api/registro', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username,password}) });
            const data = await res.json();
            if (res.ok) showMsg('registroMsg', '✅ Solicitação enviada! Aguarde a aprovação do administrador.', 'success');
            else showMsg('registroMsg', data.erro || 'Erro ao enviar solicitação.', 'danger');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
    </script>
</body>
</html>
