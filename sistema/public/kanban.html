<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Zottelli Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (!_u) window.location.href = '/login.html';
        function sair() { sessionStorage.removeItem('usuarioLogado'); window.location.href = '/login.html'; }
    </script>
    <style>
        .main-content { padding: 20px 24px; display: flex; flex-direction: column; max-height: 100vh; }
        .board-wrap { display: flex; gap: 12px; overflow-x: auto; flex-grow: 1; align-items: flex-start; padding-bottom: 12px; }
        .board-wrap::-webkit-scrollbar { height: 6px; }

        /* Pan state */
        .board-wrap.panning { cursor: grabbing; user-select: none; }
        
        /* Column */
        .kb-col { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; width: 200px; min-width: 200px; display: flex; flex-direction: column; max-height: calc(100vh - 130px); }
        .kb-col-head { padding: 10px 12px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .kb-col-title { font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .kb-col-count { font-size: 0.72rem; background: var(--bg3); border-radius: 12px; padding: 2px 7px; color: var(--muted); }
        .kb-cards { padding: 8px 6px; overflow-y: auto; flex-grow: 1; min-height: 60px; }

        /* Card */
        .kb-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s; user-select: none; }
        .kb-card:hover { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); transform: translateY(-1px); }
        .kb-card.dragging { opacity: 0.35; cursor: grabbing; }
        .kb-card[draggable="true"] { cursor: grab; }

        /* Card status colors via left border */
        .desp-concluso   { border-left: 3px solid var(--success) !important; }
        .desp-concluindo { border-left: 3px solid var(--info) !important; }
        .desp-pendente   { border-left: 3px solid var(--danger) !important; }

        .kb-card .cv-modelo { font-size: 0.82rem; font-weight: 600; color: var(--text); }
        .kb-card .cv-placa  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
        .kb-card .cv-ano    { font-size: 0.7rem; color: var(--muted); }
        .kb-card .cv-badge  { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; display: inline-block; white-space: nowrap; }

        /* Novos estilos para dados expostos do Kanban */
        .cv-detalhe-linha { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; }
        .cv-d-label { color: var(--muted); }
        .cv-d-val { font-weight: 500; color: var(--text); }
        
        .cv-highlight-block { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px; text-align: center; }
        .cv-hl-label { display: block; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.5px; font-weight: 700; margin-bottom: 2px; }
        .cv-hl-val { font-size: 0.85rem; font-weight: 700; color: var(--accent); white-space: nowrap; }

        /* Drop highlight */
        .kb-cards.drag-over { background: var(--bg3); border-radius: 6px; }

        /* Column accent colors */
        .kc-transportadora .kb-col-title { color: #7986cb; }
        .kc-painel        .kb-col-title { color: #4fc3f7; }
        .kc-funilaria     .kb-col-title { color: #ce93d8; }
        .kc-oficina       .kb-col-title { color: #ffb74d; }
        .kc-outro         .kb-col-title { color: #90a4ae; }
        .kc-lavagem       .kb-col-title { color: #4dd0e1; }
        .kc-foto          .kb-col-title { color: #aed581; }
        .kc-pendencias    .kb-col-title { color: #ffb300; }
        .kc-pronto        .kb-col-title { color: #66bb6a; }
        .kc-reservado     .kb-col-title { color: #f48fb1; }
        .kc-vendido       .kb-col-title { color: #8ac926; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="brand-logo">ZOTTELLI<span>.</span></a>
        <ul class="nav flex-column mt-2" id="sidebarNav"></ul>
    </div>
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="section-title m-0"><i class="bi bi-kanban me-2"></i>Pipeline de Veículos</h4>
                <small class="text-muted">Clique nos cards para detalhes · Arraste para mover</small>
            </div>
            <div class="btn-group btn-group-sm">
                <button class="btn btn-secondary active" id="filtroTodos" onclick="filtrar('todos')">Todos</button>
                <button class="btn btn-outline-secondary" id="filtroMeus" onclick="filtrar('meus')">Meus Carros</button>
            </div>
        </div>
        <div class="board-wrap" id="kanbanBoard"></div>
    </div>

    <script>
        // Mouse edge auto-scroll during drag & drop, and click-and-drag pan
        const board = document.getElementById('kanbanBoard');
        let isDown = false;
        let startX;
        let scrollLeft;
        let dragScrollInterval = null;

        board.addEventListener('mousedown', (e) => {
            // Se estiver clicando em um card que é draggable, não faz o pan da board.
            if (e.target.closest('.kb-card')) return;
            isDown = true;
            board.classList.add('panning');
            startX = e.pageX - board.offsetLeft;
            scrollLeft = board.scrollLeft;
        });
        board.addEventListener('mouseleave', () => { isDown = false; board.classList.remove('panning'); });
        board.addEventListener('mouseup', () => { isDown = false; board.classList.remove('panning'); });
        board.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - board.offsetLeft;
            const walk = (x - startX) * 1.5; // Multiplier for speed
            board.scrollLeft = scrollLeft - walk;
        });

        function handleDragAutoScroll(e) {
            if (!dragCard) return;
            const x = e.clientX;
            const margin = 100; // px threshold from edge
            clearTimeout(dragScrollInterval);
            if (x > window.innerWidth - margin) {
                dragScrollInterval = setInterval(() => { board.scrollLeft += 15; }, 20);
            } else if (x < margin) {
                dragScrollInterval = setInterval(() => { board.scrollLeft -= 15; }, 20);
            } else {
                clearInterval(dragScrollInterval);
            }
        }
        document.addEventListener('dragover', handleDragAutoScroll);
        document.addEventListener('touchmove', (e) => {
            if (dragCard) handleDragAutoScroll(e.touches[0]);
        }, { passive: false });
        document.addEventListener('dragend', () => clearInterval(dragScrollInterval));
        document.addEventListener('touchend', () => clearInterval(dragScrollInterval));
    </script>

    <!-- Modal detalhes do card -->
    <div class="modal fade" id="modalCard" tabindex="-1">
        <div class="modal-dialog modal-md">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title mb-0" id="mCardTitulo"></h5>
                        <small class="text-muted" id="mCardSub"></small>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="mCardId">
                    <!-- Status do Despachante (info somente leitura) -->
                    <div class="mb-3 p-3 rounded" style="background:var(--bg3);">
                        <small class="text-muted d-block mb-1" style="text-transform:uppercase;letter-spacing:0.5px;font-size:0.7rem;">Despachante</small>
                        <span id="mCardDespBadge"></span>
                    </div>
                    <hr style="border-color:var(--border)">
                    <div class="row g-3">
                        <div class="col-12 mb-2">
                            <label class="form-label"><i class="bi bi-key me-1"></i>Chave Reserva</label>
                            <div class="form-check form-switch mt-1">
                                <input class="form-check-input" type="checkbox" id="mChaveReserva" style="width:2.5rem;height:1.3rem;">
                                <label class="form-check-label" for="mChaveReserva" id="mChaveLabel">Não</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <label class="form-label"><i class="bi bi-book me-1"></i>Manual Original</label>
                            <input type="number" min="0" class="form-control" id="mManualOrig" placeholder="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label"><i class="bi bi-book me-1"></i>Manual Atual</label>
                            <input type="number" min="0" class="form-control" id="mManualAtual" placeholder="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label"><i class="bi bi-speedometer2 me-1"></i>KM Original</label>
                            <input type="number" min="0" class="form-control" id="mKmOrig" placeholder="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label"><i class="bi bi-speedometer2 me-1"></i>KM Atual</label>
                            <input type="number" min="0" class="form-control" id="mKmNova" placeholder="0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="salvarCard()"><i class="bi bi-floppy me-1"></i>Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        const usuarioLogado = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        const apiHeaders = { 'Content-Type': 'application/json', 'x-username': usuarioLogado?.username || '' };

        function exportarExcel() {
            if (!frotaData || !frotaData.length) return alert('Sem dados para exportar.');
            const carrosExibidos = filtroAtivo === 'meus' ? frotaData.filter(c => c._isDono) : frotaData;
            
            const cabecalho = ['Carro', 'Placa', 'Ano', 'Pipeline/Etapa', 'Despachante Status', 'Chave Reserva', 'Manual', 'KM Atual', 'Origem', 'Destino', 'Dono'];
            const linhas = carrosExibidos.map(c => [
                c.modelo, c.placa, c.ano, c.kanban_col || 'Na Loja C/ Pendências',
                c.desp_status || 'Pendente',
                c.chave_reserva ? 'Sim' : 'Não',
                c.manual_atual > 0 ? 'Sim' : 'Não',
                c.km_nova || c.km_original || 0,
                c.origem || '', c.destino || '', c.dono || 'Nenhum'
            ]);
            exportToExcel('pipeline_kanban', cabecalho, linhas);
        }

        buildSidebar('kanban.html');

        const COLUNAS = [
            { id: 'Transportadora',        css: 'kc-transportadora', icon: 'bi-truck' },
            { id: 'Painel',                css: 'kc-painel',          icon: 'bi-tools' },
            { id: 'Funilaria',             css: 'kc-funilaria',       icon: 'bi-wrench-adjustable' },
            { id: 'Oficina',               css: 'kc-oficina',         icon: 'bi-gear' },
            { id: 'Outro',                 css: 'kc-outro',           icon: 'bi-three-dots' },
            { id: 'Lavagem',               css: 'kc-lavagem',         icon: 'bi-droplet' },
            { id: 'Foto / Texto',          css: 'kc-foto',            icon: 'bi-camera' },
            { id: 'Na Loja C/ Pendências', css: 'kc-pendencias',      icon: 'bi-exclamation-circle' },
            { id: 'Pronto para Venda',     css: 'kc-pronto',          icon: 'bi-check-circle' },
            { id: 'Reservado',             css: 'kc-reservado',       icon: 'bi-bookmark-fill' },
            { id: 'Vendido',               css: 'kc-vendido',         icon: 'bi-bag-check' },
        ];

        let frotaData = [];
        let filtroAtivo = 'todos';
        let dragCard = null;

        async function carregar() {
            const res = await fetch('/api/frota', { headers: apiHeaders });
            frotaData = await res.json();
            renderizar();
        }

        function filtrar(tipo) {
            filtroAtivo = tipo;
            document.getElementById('filtroTodos').className = tipo === 'todos' ? 'btn btn-secondary active' : 'btn btn-outline-secondary';
            document.getElementById('filtroMeus').className  = tipo === 'meus'  ? 'btn btn-secondary active' : 'btn btn-outline-secondary';
            renderizar();
        }

        function despClass(status) {
            if (status === 'Concluso')   return 'desp-concluso';
            if (status === 'Concluindo') return 'desp-concluindo';
            return 'desp-pendente';
        }
        function despBadgeHtml(status) {
            const map = {
                Concluso:   ['badge-concluso',   '🟢 Concluso'],
                Concluindo: ['badge-concluindo', '🔵 Concluindo'],
                Pendente:   ['badge-pendente',   '🔴 Pendente'],
            };
            const [cls, label] = map[status] || map['Pendente'];
            return `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;" class="${cls}">${label}</span>`;
        }

        function renderizar() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            const carros = filtroAtivo === 'meus' ? frotaData.filter(c => c._isDono) : frotaData;

            COLUNAS.forEach(col => {
                const colCarros = carros.filter(c => (c.kanban_col || 'Na Loja C/ Pendências') === col.id);
                const cssSlug = col.css.replace('kc-','');
                const colEl = document.createElement('div');
                colEl.className = `kb-col ${col.css}`;
                colEl.innerHTML = `
                    <div class="kb-col-head">
                        <span class="kb-col-title"><i class="bi ${col.icon} me-1"></i>${col.id}</span>
                        <span class="kb-col-count">${colCarros.length}</span>
                    </div>
                    <div class="kb-cards" id="col-${cssSlug}" data-col="${col.id}">
                        ${colCarros.map(car => cardHtml(car)).join('')}
                    </div>`;
                board.appendChild(colEl);

                const area = colEl.querySelector('.kb-cards');
                area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
                area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
                area.addEventListener('drop', async e => {
                    e.preventDefault(); area.classList.remove('drag-over');
                    if (!dragCard) return;
                    const id = parseInt(dragCard.dataset.id);
                    const novaCol = area.dataset.col;
                    area.appendChild(dragCard);
                    dragCard.classList.remove('dragging');
                    await fetch(`/api/frota/${id}/kanban`, { method:'PUT', headers: apiHeaders, body: JSON.stringify({ kanban_col: novaCol }) });
                    const car = frotaData.find(c => c.id === id);
                    if (car) car.kanban_col = novaCol;
                    atualizarContadores();
                    dragCard = null;
                });
            });

            // Drag + Touch events nos cards
            document.querySelectorAll('.kb-card').forEach(card => {
                // Desktop drag
                card.addEventListener('dragstart', e => { dragCard = card; setTimeout(() => card.classList.add('dragging'), 0); });
                card.addEventListener('dragend', () => { if (dragCard) dragCard.classList.remove('dragging'); });

                // Mobile touch drag
                let touchClone = null;
                let lastArea = null;
                card.addEventListener('touchstart', e => {
                    dragCard = card;
                    card.style.opacity = '0.4';
                }, { passive: true });
                card.addEventListener('touchmove', e => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    // Highlight drop zone under finger
                    const el = document.elementFromPoint(touch.clientX, touch.clientY);
                    const area = el?.closest('.kb-cards');
                    if (area !== lastArea) {
                        if (lastArea) lastArea.classList.remove('drag-over');
                        if (area) area.classList.add('drag-over');
                        lastArea = area;
                    }
                }, { passive: false });
                card.addEventListener('touchend', async e => {
                    card.style.opacity = '';
                    if (lastArea) lastArea.classList.remove('drag-over');
                    if (!dragCard) return;
                    const touch = e.changedTouches[0];
                    const el = document.elementFromPoint(touch.clientX, touch.clientY);
                    const area = el?.closest('.kb-cards');
                    if (area) {
                        const id = parseInt(dragCard.dataset.id);
                        const novaCol = area.dataset.col;
                        area.appendChild(dragCard);
                        dragCard.classList.remove('dragging');
                        await fetch(`/api/frota/${id}/kanban`, { method:'PUT', headers: apiHeaders, body: JSON.stringify({ kanban_col: novaCol }) });
                        const car = frotaData.find(c => c.id === id);
                        if (car) car.kanban_col = novaCol;
                        atualizarContadores();
                    } else {
                        // Tapped, not dragged — open modal
                        const cardId = parseInt(dragCard.dataset.id);
                        abrirCard(cardId);
                    }
                    lastArea = null;
                    dragCard = null;
                });

                card.addEventListener('click', () => abrirCard(parseInt(card.dataset.id)));
            });
        }

        function cardHtml(car) {
            const ds = car.desp_status || 'Pendente';
            const isDono = car._isDono;
            const minhaBadge = isDono
                ? `<span class="cv-badge" style="background:rgba(63,185,80,0.1);color:var(--success);">✔ Meu</span>`
                : `<span class="cv-badge" style="background:rgba(139,148,158,0.1);color:var(--muted);">Compartilhado</span>`;
            
            // Novos campos expostos:
            const temChave = car.chave_reserva ? '<span class="text-success"><i class="bi bi-check me-1"></i>Sim</span>' : '<span class="text-danger"><i class="bi bi-x me-1"></i>Não</span>';
            const manualHtml = `<div class="cv-highlight-block"><span class="cv-hl-label">MANUAL</span><div class="cv-hl-val">${car.manual_original || 0} <i class="bi bi-arrow-right text-muted mx-1" style="font-size:0.8rem"></i> ${car.manual_atual || 0}</div></div>`;
            const kmHtml = `<div class="cv-highlight-block"><span class="cv-hl-label">KM ATUAL</span><div class="cv-hl-val text-white">${Number(car.km_nova || car.km_original || 0).toLocaleString('pt-BR')}</div></div>`;
            
            return `
                <div class="kb-card ${despClass(ds)}" draggable="true" data-id="${car.id}">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <div>
                            <div class="cv-modelo">${car.modelo}</div>
                            <div class="cv-placa">${car.placa} · ${car.ano}</div>
                        </div>
                        ${minhaBadge}
                    </div>
                    
                    <div class="cv-detalhe-linha mt-2">
                        <span class="cv-d-label">Despachante:</span>
                        <span class="cv-d-val">${ds}</span>
                    </div>
                    <div class="cv-detalhe-linha mb-2">
                        <span class="cv-d-label">Chave Reserva:</span>
                        <span class="cv-d-val">${temChave}</span>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        ${kmHtml}
                        ${manualHtml}
                    </div>
                </div>`;
        }

        function abrirCard(id) {
            const car = frotaData.find(c => c.id === id);
            if (!car) return;
            document.getElementById('mCardId').value = id;
            document.getElementById('mCardTitulo').textContent = car.modelo;
            document.getElementById('mCardSub').textContent = `${car.placa} · ${car.ano}`;
            document.getElementById('mCardDespBadge').innerHTML = despBadgeHtml(car.desp_status || 'Pendente');
            document.getElementById('mChaveReserva').checked = !!car.chave_reserva;
            document.getElementById('mChaveLabel').textContent = car.chave_reserva ? 'Sim' : 'Não';
            document.getElementById('mManualOrig').value  = car.manual_original || 0;
            document.getElementById('mManualAtual').value = car.manual_atual || 0;
            document.getElementById('mKmOrig').value  = car.km_original || 0;
            document.getElementById('mKmNova').value  = car.km_nova || 0;
            new bootstrap.Modal(document.getElementById('modalCard')).show();
        }

        document.getElementById('mChaveReserva').addEventListener('change', function() {
            document.getElementById('mChaveLabel').textContent = this.checked ? 'Sim' : 'Não';
        });

        async function salvarCard() {
            const id = document.getElementById('mCardId').value;
            const car = frotaData.find(c => c.id === parseInt(id));
            if (!car) return;
            const body = {
                ...car,
                chave_reserva: document.getElementById('mChaveReserva').checked ? 1 : 0,
                manual_original: parseInt(document.getElementById('mManualOrig').value) || 0,
                manual_atual: parseInt(document.getElementById('mManualAtual').value) || 0,
                km_original: parseFloat(document.getElementById('mKmOrig').value) || 0,
                km_nova: parseFloat(document.getElementById('mKmNova').value) || 0,
            };
            await fetch(`/api/frota/${id}`, { method:'PUT', headers: apiHeaders, body: JSON.stringify(body) });
            // update local
            Object.assign(car, { chave_reserva: body.chave_reserva, manual_original: body.manual_original, manual_atual: body.manual_atual, km_original: body.km_original, km_nova: body.km_nova });
            bootstrap.Modal.getInstance(document.getElementById('modalCard')).hide();
        }

        function atualizarContadores() {
            const carros = filtroAtivo === 'meus' ? frotaData.filter(c => c._isDono) : frotaData;
            COLUNAS.forEach(col => {
                const slug = col.css.replace('kc-','');
                const el = document.getElementById(`col-${slug}`)?.closest('.kb-col')?.querySelector('.kb-col-count');
                if (el) el.textContent = carros.filter(c => (c.kanban_col||'Na Loja C/ Pendências') === col.id).length;
            });
        }

        window.onload = carregar;
    </script>

    <!-- Botao export Excel -->

    <div id="excel-btn-float" style="position:fixed;bottom:22px;right:22px;z-index:500">
      <button onclick="exportarExcel()" style="background:rgba(22,22,22,.95);border:1px solid #22c55e;color:#22c55e;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 12px rgba(34,197,94,.2)">
        <span style="font-size:16px">↓</span> Excel
      </button>
    </div>
</body>
</html>
