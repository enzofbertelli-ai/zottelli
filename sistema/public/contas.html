<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas | Zottelli Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/imask"></script>
    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (!_u) window.location.href = '/login.html';
        function sair() { sessionStorage.removeItem('usuarioLogado'); window.location.href = '/login.html'; }
    </script>
    <link href="style.css" rel="stylesheet">
    <style>
        .conta-card { border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; transition: opacity 0.3s; }
        .conta-eu-devo  { background-color: rgba(248,81,73,0.06);  border-left: 4px solid var(--danger); }
        .conta-me-devem { background-color: rgba(63,185,80,0.06);   border-left: 4px solid var(--success); }
        .conta-liquidada { opacity: 0.45; text-decoration: line-through; }
        .saldo-positivo { color: var(--success); }
        .saldo-negativo { color: var(--danger); }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" class="brand-logo">ZOTTELLI<span style="color:var(--accent);">.</span></a>
        <ul class="nav flex-column mt-2" id="sidebarNav"></ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-white m-0"><i class="bi bi-currency-exchange me-2"></i>Contas entre Usuários</h3>
            <div class="d-flex gap-2">
                <select class="form-select form-select-sm" id="filtroStatus" style="width:auto;" onchange="renderizar()">
                    <option value="todas">Todas</option>
                    <option value="abertas">Somente Abertas</option>
                    <option value="liquidadas">Somente Liquidadas</option>
                </select>
                <button class="btn btn-primary" onclick="abrirModalNova()"><i class="bi bi-plus-circle me-2"></i>Nova Conta</button>
            </div>
        </div>

        <!-- Painel de Saldo -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Eu devo (total em aberto)</small>
                    <h4 class="mt-1 mb-0 saldo-negativo" id="totalEuDevo">R$ 0,00</h4>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Me devem (total em aberto)</small>
                    <h4 class="mt-1 mb-0 saldo-positivo" id="totalMeDevem">R$ 0,00</h4>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <small class="text-muted">Saldo líquido</small>
                    <h4 class="mt-1 mb-0" id="saldoLiquido">R$ 0,00</h4>
                </div>
            </div>
        </div>

        <!-- Lista de contas -->
        <div id="listaContas"></div>
    </div>

    <!-- Modal Nova Conta -->
    <div class="modal fade" id="modalNovaConta" tabindex="-1" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Registrar Nova Conta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Quem paga?</label>
                        <select class="form-select" id="ncDe"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Para quem?</label>
                        <select class="form-select" id="ncPara"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="ncDesc" placeholder="Ex: Combustível, Despachante, Almoço...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor</label>
                        <input type="text" class="form-control" id="ncValor" placeholder="R$ 0,00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" class="form-control" id="ncData">
                    </div>
                    <div id="erroNovaConta" class="alert alert-danger p-2 text-center" style="display:none;"></div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-primary" onclick="salvarConta()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        const usuarioLogado = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        const apiHeaders = { 'Content-Type': 'application/json', 'x-username': usuarioLogado?.username || '' };

        function exportarExcel() {
            if (!contasData || !contasData.length) return alert('Sem contas registradas para exportar.');
            
            const cabecalho = ['ID', 'Descrição', 'Quem Paga', 'Para Quem', 'Valor (R$)', 'Data', 'Criado Por', 'Status'];
            const linhas = contasData.map(c => [
                c.id, c.descricao, c.de_usuario, c.para_usuario, c.valor,
                c.data ? c.data.split('-').reverse().join('/') : '',
                c.criado_por || '',
                c.liquidado ? 'Liquidado' : 'Em Aberto'
            ]);
            exportToExcel('contas_usuarios', cabecalho, linhas);
        }

        buildSidebar('contas.html');

        let contasData = [];
        const fmt = n => 'R$ ' + Number(n).toLocaleString('pt-BR', {minimumFractionDigits: 2});

        async function carregarContas() {
            const res = await fetch('/api/contas', { headers: apiHeaders });
            contasData = await res.json();
            renderizar();
        }

        async function carregarUsuarios() {
            const res = await fetch('/api/usuarios/lista', { headers: apiHeaders });
            const users = await res.json();
            ['ncDe', 'ncPara'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = users.map(u =>
                    `<option value="${u}" ${id === 'ncDe' && u === usuarioLogado?.username ? 'selected' : ''}>${u}</option>`
                ).join('');
            });
        }

        function renderizar() {
            const filtro = document.getElementById('filtroStatus').value;
            const lista = document.getElementById('listaContas');
            const eu = usuarioLogado?.username;

            let euDevo = 0, meDevem = 0;
            contasData.forEach(c => {
                if (!c.liquidado) {
                    if (c.de_usuario === eu) euDevo += c.valor;
                    if (c.para_usuario === eu) meDevem += c.valor;
                }
            });

            document.getElementById('totalEuDevo').textContent = fmt(euDevo);
            document.getElementById('totalMeDevem').textContent = fmt(meDevem);
            const saldo = meDevem - euDevo;
            const saldoEl = document.getElementById('saldoLiquido');
            saldoEl.textContent = fmt(Math.abs(saldo));
            saldoEl.className = saldo >= 0 ? 'mt-1 mb-0 saldo-positivo' : 'mt-1 mb-0 saldo-negativo';

            const filtradas = contasData.filter(c => {
                if (filtro === 'abertas') return !c.liquidado;
                if (filtro === 'liquidadas') return c.liquidado;
                return true;
            });

            if (filtradas.length === 0) {
                lista.innerHTML = '<p class="text-muted text-center py-5">Nenhuma conta registrada.</p>';
                return;
            }

            lista.innerHTML = filtradas.map(c => {
                const isEuDevo = c.de_usuario === eu;
                const cardClass = c.liquidado ? 'conta-card conta-liquidada bg-secondary bg-opacity-10' :
                                  isEuDevo ? 'conta-card conta-eu-devo' : 'conta-card conta-me-devem';
                const dt = c.data ? c.data.split('-').reverse().join('/') : '—';
                const liquidadoInfo = c.liquidado && c.data_liquidacao ?
                    `<small class="text-muted"> · Liquidado em ${new Date(c.data_liquidacao).toLocaleDateString('pt-BR')}</small>` : '';

                return `
                <div class="${cardClass}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong class="text-white">${c.descricao}</strong>
                            ${liquidadoInfo}
                            <div class="mt-1 small">
                                <span class="text-danger"><i class="bi bi-person-fill me-1"></i>${c.de_usuario}</span>
                                <span class="text-muted mx-2">→</span>
                                <span class="text-success"><i class="bi bi-person-fill me-1"></i>${c.para_usuario}</span>
                                <span class="text-muted ms-3">${dt}</span>
                            </div>
                            ${c.criado_por ? `<small class="text-muted">Registrado por: ${c.criado_por}</small>` : ''}
                        </div>
                        <div class="text-end">
                            <div class="fw-bold fs-5 ${isEuDevo ? 'saldo-negativo' : 'saldo-positivo'}">${fmt(c.valor)}</div>
                            <div class="btn-group mt-1">
                                ${!c.liquidado ? `<button class="btn btn-sm btn-outline-success" title="Liquidar" onclick="liquidar(${c.id})"><i class="bi bi-check2-circle"></i></button>` : ''}
                                <button class="btn btn-sm btn-outline-danger" title="Excluir" onclick="excluir(${c.id})"><i class="bi bi-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function abrirModalNova() {
            document.getElementById('ncDesc').value = '';
            document.getElementById('ncValor').value = '';
            document.getElementById('ncData').value = new Date().toISOString().split('T')[0];
            document.getElementById('erroNovaConta').style.display = 'none';
            new bootstrap.Modal(document.getElementById('modalNovaConta')).show();
        }

        async function salvarConta() {
            const de_usuario = document.getElementById('ncDe').value;
            const para_usuario = document.getElementById('ncPara').value;
            const descricao = document.getElementById('ncDesc').value.trim();
            const valorStr = document.getElementById('ncValor').value;
            const valor = parseFloat(valorStr.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0;
            const data = document.getElementById('ncData').value;
            const erroDiv = document.getElementById('erroNovaConta');

            if (de_usuario === para_usuario) { erroDiv.textContent = 'Selecione usuários diferentes.'; erroDiv.style.display = 'block'; return; }
            if (!descricao || valor <= 0 || !data) { erroDiv.textContent = 'Preencha todos os campos.'; erroDiv.style.display = 'block'; return; }

            await fetch('/api/contas', { method: 'POST', headers: apiHeaders, body: JSON.stringify({ de_usuario, para_usuario, descricao, valor, data }) });
            bootstrap.Modal.getInstance(document.getElementById('modalNovaConta')).hide();
            carregarContas();
        }

        async function liquidar(id) {
            if (!confirm('Marcar esta conta como liquidada?')) return;
            await fetch(`/api/contas/${id}/liquidar`, { method: 'PUT', headers: apiHeaders });
            carregarContas();
        }

        async function excluir(id) {
            if (!confirm('Excluir esta conta permanentemente?')) return;
            await fetch(`/api/contas/${id}`, { method: 'DELETE', headers: apiHeaders });
            carregarContas();
        }

        // Máscara de dinheiro
        document.addEventListener('DOMContentLoaded', () => {
            IMask(document.getElementById('ncValor'), { mask: 'R$ num', blocks: { num: { mask: Number, thousandsSeparator: '.', padFractionalZeros: true, radix: ',' } } });
        });

        window.onload = () => { carregarUsuarios(); carregarContas(); };
    </script>

    <!-- Botao export Excel -->

    <div id="excel-btn-float" style="position:fixed;bottom:22px;right:22px;z-index:500">
      <button onclick="exportarExcel()" style="background:rgba(22,22,22,.95);border:1px solid #22c55e;color:#22c55e;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 12px rgba(34,197,94,.2)">
        <span style="font-size:16px">↓</span> Excel
      </button>
    </div>
</body>
</html>
