<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Contratos | Zottelli Selection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <script src="https://unpkg.com/imask"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (!_u) window.location.href = '/login.html';
        function sair() { sessionStorage.removeItem('usuarioLogado'); window.location.href = '/login.html'; }
    </script>

    <style>
        .section-title { font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: bold; }
        .box-troca { background-color: var(--bg3); padding: 15px; border-radius: 8px; border: 1px dashed var(--border); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" class="brand-logo">ZOTTELLI<span style="color:var(--accent);">.</span></a>
        <ul class="nav flex-column mt-2" id="sidebarNav"></ul>
    </div>

    <div class="main-content">
        <div class="card p-4">
            <h4 class="mb-4 text-white">Novo Contrato de Compra e Venda</h4>

            <form id="formContrato">
                <div class="section-title mt-2">Dados da Loja (Vendedor)</div>
                <div class="row mb-4">
                    <div class="col-md-8">
                        <label class="form-label text-muted">Razão Social</label>
                        <select class="form-select" id="razaoSocial" onchange="atualizarCNPJ()">
                            <option value="" selected disabled>Selecione a empresa faturadora...</option>
                            <option value="jonas">JONAS RICIERE FERREIRA ZOTTIS LTDA</option>
                            <option value="enzo">ENZO FERNANDES BERTELLI LTDA</option>
                            <option value="vier">VIER GROUP CONSULTORIA LTDA</option>
                            <option value="patrick">PATRICK NÍQUEL VIER LTDA</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted">CNPJ</label>
                        <input type="text" class="form-control" id="cnpjLoja" readonly placeholder="Selecionado automaticamente">
                    </div>
                </div>

                <div class="section-title">Dados do Comprador</div>
                <div class="row mb-4">
                    <div class="col-md-8">
                        <label class="form-label text-muted">Nome Completo</label>
                        <input type="text" class="form-control" id="nomeComprador" placeholder="Ex: João da Silva" style="text-transform: uppercase;">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted">CPF / CNPJ</label>
                        <input type="text" class="form-control" id="cpfCnpjComprador" placeholder="000.000.000-00">
                    </div>
                </div>

                <div class="section-title">Dados do Veículo (Objeto da Venda)</div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label text-muted">Marca</label>
                        <input type="text" class="form-control" id="marcaVeiculo" style="text-transform: uppercase;">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted">Modelo</label>
                        <input type="text" class="form-control" id="modeloVeiculo" style="text-transform: uppercase;">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted">Ano (Fab/Mod)</label>
                        <input type="text" class="form-control" id="anoVeiculo" placeholder="0000/0000">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-muted">Cor</label>
                        <input type="text" class="form-control" id="corVeiculo" style="text-transform: uppercase;">
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label text-muted">Placa</label>
                        <input type="text" class="form-control" id="placaVeiculo" placeholder="ABC1D23" style="text-transform: uppercase;">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted">RENAVAM</label>
                        <input type="text" class="form-control" id="renavamVeiculo" placeholder="Apenas números">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-muted">Valor Negociado (R$)</label>
                        <input type="text" class="form-control" id="valorTotal" placeholder="R$ 0,00">
                    </div>
                </div>

                <div class="section-title">Prazos e Datas</div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted">Data da Venda</label>
                        <input type="date" class="form-control" id="dataVenda" onchange="calcularDataEntrega()">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted">Data Máxima p/ Entrega de Documentação</label>
                        <input type="date" class="form-control" id="dataEntrega">
                    </div>
                </div>

                <div class="section-title">Formas de Pagamento</div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label text-muted">Quantidade de Pagamentos</label>
                        <select class="form-select" id="qtdMetodosPagamento" onchange="gerarCamposPagamento()">
                            <option value="0" selected>Selecione...</option>
                            <option value="1">1 Pagamento</option>
                            <option value="2">2 Pagamentos</option>
                            <option value="3">3 Pagamentos</option>
                            <option value="4">4 Pagamentos</option>
                            <option value="5">5 Pagamentos</option>
                        </select>
                    </div>
                </div>

                <div id="containerPagamentos" class="mb-4"></div>

                <div class="d-flex justify-content-end gap-3 mt-5 pt-3 border-top border-secondary">
                    <button type="button" class="btn btn-danger btn-lg" onclick="gerarPDF()">
                        <i class="bi bi-file-pdf me-2"></i> Salvar PDF
                    </button>
                    <button type="button" class="btn btn-secondary btn-lg" onclick="imprimirPDF()">
                        <i class="bi bi-printer me-2"></i> Imprimir
                    </button>
                    <button type="button" class="btn btn-success btn-lg" onclick="enviarWhatsApp()">
                        <i class="bi bi-whatsapp me-2"></i> WhatsApp
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        buildSidebar('contratos.html');

        const cnpjs = {
            "jonas": "36.713.475/0001-72", "enzo": "54.340.855/0001-90",
            "vier": "94.302.320/0001-40", "patrick": "54.537.264/0001-08"
        };

        function atualizarCNPJ() {
            const select = document.getElementById('razaoSocial');
            document.getElementById('cnpjLoja').value = cnpjs[select.value] || '';
        }

        function calcularDataEntrega() {
            const dataVendaInput = document.getElementById('dataVenda').value;
            if(dataVendaInput) {
                const data = new Date(dataVendaInput + 'T12:00:00Z');
                data.setDate(data.getDate() + 30);
                document.getElementById('dataEntrega').value = data.toISOString().split('T')[0];
            }
        }

        function aplicarMascarasIniciais() {
            IMask(document.getElementById('cpfCnpjComprador'), { mask: [ {mask: '000.000.000-00'}, {mask: '00.000.000/0001-00'} ] });
            IMask(document.getElementById('anoVeiculo'), { mask: '0000/0000' });
            IMask(document.getElementById('renavamVeiculo'), { mask: '00000000000' });
            IMask(document.getElementById('valorTotal'), { mask: 'R$ num', blocks: { num: { mask: Number, thousandsSeparator: '.', padFractionalZeros: true, radix: ',' } } });
        }
        document.addEventListener("DOMContentLoaded", aplicarMascarasIniciais);

        function gerarCamposPagamento() {
            const quantidade = document.getElementById('qtdMetodosPagamento').value;
            const container = document.getElementById('containerPagamentos');
            container.innerHTML = '';

            for (let i = 1; i <= quantidade; i++) {
                const div = document.createElement('div');
                div.className = 'row mb-3 align-items-center';
                div.innerHTML = `
                    <div class="col-md-4">
                        <label class="form-label text-muted">Método ${i}</label>
                        <select class="form-select" id="tipoMetodo_${i}" onchange="verificarTroca(this, ${i})">
                            <option value="PIX">PIX</option><option value="TED">TED</option>
                            <option value="CONSÓRCIO">Consórcio</option><option value="FINANCIAMENTO">Financiamento</option>
                            <option value="VEÍCULO NA TROCA">Veículo na Troca</option><option value="CRIPTOMOEDAS">Criptomoedas</option>
                            <option value="CARTÃO DE CRÉDITO">Cartão de Crédito</option><option value="EM ESPÉCIE">Em Espécie</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-muted">Valor (R$)</label>
                        <input type="text" class="form-control mascara-dinheiro" id="valorMetodo_${i}" placeholder="R$ 0,00">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label text-muted">Detalhes / Observações</label>
                        <input type="text" class="form-control" id="obsMetodo_${i}" placeholder="Ex: Banco Santander...">
                    </div>
                    <div class="col-md-12" id="box-troca-${i}" style="display: none;">
                        <div class="box-troca mt-2 row g-2">
                            <div class="col-12"><strong class="text-warning"><i class="bi bi-car-front"></i> Dados do Veículo na Troca</strong></div>
                            <div class="col-md-3"><input type="text" id="marcaTroca_${i}" class="form-control form-control-sm" placeholder="Marca (Ex: Fiat)"></div>
                            <div class="col-md-3"><input type="text" id="modeloTroca_${i}" class="form-control form-control-sm" placeholder="Modelo (Ex: Toro)"></div>
                            <div class="col-md-2"><input type="text" id="anoTroca_${i}" class="form-control form-control-sm mascara-ano" placeholder="Ano (0000/0000)"></div>
                            <div class="col-md-2"><input type="text" id="placaTroca_${i}" class="form-control form-control-sm" placeholder="Placa" style="text-transform:uppercase"></div>
                            <div class="col-md-2"><input type="text" id="renavamTroca_${i}" class="form-control form-control-sm mascara-renavam" placeholder="RENAVAM"></div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            }

            document.querySelectorAll('.mascara-dinheiro').forEach(el => { IMask(el, { mask: 'R$ num', blocks: { num: { mask: Number, thousandsSeparator: '.', padFractionalZeros: true, radix: ',' } } }); });
            document.querySelectorAll('.mascara-ano').forEach(el => { IMask(el, { mask: '0000/0000' }); });
            document.querySelectorAll('.mascara-renavam').forEach(el => { IMask(el, { mask: '00000000000' }); });
        }

        function verificarTroca(selectElement, id) {
            const boxTroca = document.getElementById(`box-troca-${id}`);
            boxTroca.style.display = (selectElement.value === 'VEÍCULO NA TROCA') ? 'block' : 'none';
        }

        // MOTOR DO PDF (GERAÇÃO, IMPRESSÃO E WHATSAPP)
        // ==========================================

            const logoSvgString = window.atob(b64_svg.replace(/\s+/g, ''));
            const logoWatermarkString = logoSvgString.replace(/fill="#1d1d1b"/g, 'fill="#e0e0e0"');

            const selectRazao = document.getElementById('razaoSocial');
            const razaoSocial = selectRazao.options[selectRazao.selectedIndex]?.text || '___________________';
            const cnpjLoja = document.getElementById('cnpjLoja').value || '___.___.___/____-__';

            const nomeComprador = (document.getElementById('nomeComprador')?.value || '').toUpperCase() || '_______________________';
            const cpfCnpj = document.getElementById('cpfCnpjComprador')?.value || '___.___.___-__';

                    { text: '5. O VENDEDOR apresenta, para concretização do negócio, negativa de multa, expedida pelo DETRAN, assumindo a responsabilidade cível e criminal pela autenticidade do respectivo documento.', style: 'bodyContrato', margin: [0, 0, 0, 0] },

        // FUNÇÃO 1: Baixar PDF
        function gerarPDF() {
            try {
                const nome = document.getElementById('nomeComprador').value || 'Cliente';
                const placa = document.getElementById('placaVeiculo').value || 'Veiculo';
                const nomeArquivo = nome ? nome.replace(/\s+/g, '_') : 'Cliente';
                pdfMake.createPdf(getDocDefinition()).download(`Contrato_${nomeArquivo}_${placa}.pdf`);
            } catch (e) {
                console.error("Erro PDF:", e);
                alert("Falha ao gerar PDF. Verifique se todos os campos estão preenchidos corretamente ou consulte o console.");
            }
        }

        // FUNÇÃO 2: Imprimir PDF (Abre a tela de impressão direto)
        function imprimirPDF() {
            try {
                pdfMake.createPdf(getDocDefinition()).print();
            } catch (e) {
                console.error("Erro Impressão:", e);
                alert("Falha ao abrir tela de impressão.");
            }
        }

        // FUNÇÃO 3: Enviar por WhatsApp
        function enviarWhatsApp() {
            const telefone = prompt("Digite o WhatsApp do cliente com DDD (Apenas números, Ex: 51999999999):");
            if(!telefone) return;

            const nome = document.getElementById('nomeComprador').value || 'Cliente';
            const placa = document.getElementById('placaVeiculo').value || 'Veiculo';

            pdfMake.createPdf(getDocDefinition()).getBlob((blob) => {
                const file = new File([blob], `Contrato_${nome}_${placa}.pdf`, { type: "application/pdf" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    // Se estiver no celular (Android/iOS), abre a bandeja nativa de compartilhamento
                    navigator.share({
                        title: 'Contrato de Compra e Venda',
                        text: 'Olá! Segue em anexo o seu contrato.',
                        files: [file]
                    }).catch(console.error);
                } else {
                    // No computador: baixa o arquivo e abre o WhatsApp Web
                    alert("O contrato será baixado agora. O WhatsApp Web vai abrir, basta arrastar o arquivo baixado para a conversa!");
                    const marca = document.getElementById('marcaVeiculo').value || 'seu veículo';
                    const mensagem = encodeURIComponent(`Olá, ${nome}! Seu contrato referente ao ${marca} já está pronto. Segue o documento para conferência.`);

                    gerarPDF(); // Baixa o PDF
                    window.open(`https://wa.me/55${telefone}?text=${mensagem}`, '_blank'); // Abre o WhatsApp
                }
            });
        }
    </script>
