<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Zottelli Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (!_u) window.location.href = '/login.html';
        // sair() is handled by sidebar.js (clears token + calls logout endpoint)

    </script>
    <style>
        .stat-icon { width: 42px; height: 42px; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-size: 1.2rem; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--text); margin: 2px 0 0; }
        .stat-value-sm { font-size: 1.1rem; font-weight: 700; color: var(--text); margin: 2px 0 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="brand-logo">ZOTTELLI<span>.</span></a>
        <ul class="nav flex-column mt-2" id="sidebarNav"></ul>
    </div>
    <div class="main-content">
        <div class="section-header mb-4">
            <div>
                <h3 class="section-title">Visão Geral</h3>
                <p class="section-subtitle" id="dataAtual"></p>
            </div>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid var(--accent) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(88,166,255,0.1);color:var(--accent)"><i class="bi bi-car-front"></i></div>
                        <div><div class="stat-label">Veículos no Pátio</div><div class="stat-value" id="dashEstoque">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid var(--warning) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(210,153,34,0.1);color:var(--warning)"><i class="bi bi-truck"></i></div>
                        <div><div class="stat-label">Em Trânsito</div><div class="stat-value" id="dashTransito">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid var(--success) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(63,185,80,0.1);color:var(--success)"><i class="bi bi-cash-coin"></i></div>
                        <div><div class="stat-label">Lucro Acumulado</div><div class="stat-value-sm" id="dashLucro">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid var(--purple) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(188,140,255,0.1);color:var(--purple)"><i class="bi bi-bar-chart"></i></div>
                        <div><div class="stat-label">Média de Fretes</div><div class="stat-value-sm" id="dashFrete">—</div></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Segunda Linha de Estatísticas -->
        <h5 class="text-muted mt-2 mb-3" style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;"><i class="bi bi-activity me-2"></i>Atividade Recente</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid #ff7b72 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(255,123,114,0.1);color:#ff7b72"><i class="bi bi-receipt"></i></div>
                        <div><div class="stat-label">Custos Rápidos (Mês)</div><div class="stat-value-sm" id="dashGastos">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid #3fb950 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(63,185,80,0.1);color:#3fb950"><i class="bi bi-tags"></i></div>
                        <div><div class="stat-label">Oportunidades Compra</div><div class="stat-value" id="dashCompras">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid #a371f7 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(163,113,247,0.1);color:#a371f7"><i class="bi bi-clipboard2-check"></i></div>
                        <div><div class="stat-label">Tarefas Pendentes</div><div class="stat-value" id="dashTarefas">—</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4 border-0" style="border-left: 3px solid var(--gold, #d4af37) !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(212,175,55,0.1);color:var(--gold, #d4af37)"><i class="bi bi-display"></i></div>
                        <div><div class="stat-label">Showroom Ativo</div><div class="stat-value" id="dashShowroom">—</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        const usuarioLogado = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        buildSidebar('index.html');
        document.getElementById('dataAtual').textContent = new Date().toLocaleDateString('pt-BR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        async function carregarDashboard() {
            try {
                const res = await fetch('/api/dashboard');
                const data = await res.json();
                document.getElementById('dashEstoque').textContent = data.estoque;
                document.getElementById('dashTransito').textContent = data.transito;
                document.getElementById('dashLucro').textContent = 'R$ ' + (data.lucroAcumulado||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
                document.getElementById('dashFrete').textContent = 'R$ ' + (data.custoMedioFrete||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
                
                // Novas Métricas
                document.getElementById('dashGastos').textContent = 'R$ ' + (data.gastosMes||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
                document.getElementById('dashCompras').textContent = data.comprasAvaliacao || 0;
                document.getElementById('dashTarefas').textContent = data.tarefasPendentes || 0;
                document.getElementById('dashShowroom').textContent = data.showroomAtivos || 0;
            } catch(e) { console.error(e); }
        }
        window.onload = carregarDashboard;
    </script>
</body>
</html>
