<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários | Zottelli Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script>
        const _u = JSON.parse(sessionStorage.getItem('usuarioLogado') || 'null');
        if (!_u) window.location.href = '/login.html';
        if (_u && _u.cargo !== 'admin') window.location.href = '/index.html';
        function sair() { sessionStorage.removeItem('usuarioLogado'); window.location.href = '/login.html'; }
    </script>
    <style>
        .badge-pendente { background:rgba(210,153,34,0.15); color:var(--warning); border:1px solid rgba(210,153,34,0.3); padding:3px 10px; border-radius:20px; font-size:0.75rem; }
        .badge-ativo    { background:rgba(63,185,80,0.15);  color:var(--success); border:1px solid rgba(63,185,80,0.3);  padding:3px 10px; border-radius:20px; font-size:0.75rem; }
        .badge-rejeitado{ background:rgba(248,81,73,0.12);  color:var(--danger);  border:1px solid rgba(248,81,73,0.3);  padding:3px 10px; border-radius:20px; font-size:0.75rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" class="brand-logo">ZOTTELLI<span style="color:var(--accent);">.</span></a>
        <ul class="nav flex-column mt-2" id="sidebarNav"></ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-white m-0"><i class="bi bi-people me-2"></i>Gerenciar Usuários</h3>
            <button class="btn btn-primary" onclick="abrirModalNovoUsuario()"><i class="bi bi-person-plus me-2"></i>Criar Usuário</button>
        </div>

        <div class="card p-4">
            <table class="table table-dark table-hover align-middle" id="tabelaUsuarios">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Cargo</th>
                        <th>Status</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal Aprovação / Edição -->
    <div class="modal fade" id="modalEditarUsuario" tabindex="-1" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitulo">Editar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <input type="hidden" id="editUsername">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Usuário</label>
                        <p class="text-white fw-bold mb-0" id="editUsernameDisplay"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cargo</label>
                        <select class="form-select" id="editCargo">
                            <option value="funcionario">Funcionário</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="editStatus">
                            <option value="ativo">Ativo</option>
                            <option value="pendente">Pendente</option>
                            <option value="rejeitado">Rejeitado</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-secondary justify-content-between">
                    <button type="button" class="btn btn-outline-warning btn-sm" onclick="resetarSenha()"><i class="bi bi-key me-1"></i>Resetar Senha</button>
                    <button type="button" class="btn btn-primary" onclick="salvarUsuario()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Novo Usuário (pelo admin) -->
    <div class="modal fade" id="modalNovoUsuario" tabindex="-1" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Criar Novo Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="novoUsername" placeholder="Ex: joao.silva">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha Inicial</label>
                        <input type="text" class="form-control" id="novoSenha" placeholder="Ex: 12345">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cargo</label>
                        <select class="form-select" id="novoCargo">
                            <option value="funcionario">Funcionário</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-primary" onclick="criarNovoUsuario()">Criar Usuário</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Reset Senha -->
    <div class="modal fade" id="modalSenhaReset" tabindex="-1" data-bs-theme="dark">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Senha Redefinida</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p class="text-muted">Passe a nova senha temporária para o usuário:</p>
                    <h2 class="text-success fw-bold" id="senhaGerada">---</h2>
                    <p class="text-muted small">O usuário deverá trocar sua senha após o login.</p>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        const usuarioLogado = JSON.parse(sessionStorage.getItem('usuarioLogado'));
        const headers = { 'Content-Type': 'application/json', 'x-username': usuarioLogado?.username || '' };
        buildSidebar('usuarios.html');

        let usuariosData = [];

        async function carregarUsuarios() {
            const res = await fetch('/api/usuarios', { headers });
            usuariosData = await res.json();
            renderizar();
        }

        function renderizar() {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = '';
            usuariosData.forEach(u => {
                let badgeClass = u.status === 'ativo' ? 'badge-ativo' : u.status === 'pendente' ? 'badge-pendente' : 'badge-rejeitado';
                let badgeText = u.status === 'ativo' ? 'Ativo' : u.status === 'pendente' ? 'Pendente' : 'Rejeitado';
                let cargoIcon = u.cargo === 'admin' ? '<i class="bi bi-shield-fill text-primary me-1"></i>' : '<i class="bi bi-person-fill text-muted me-1"></i>';
                let cargoText = u.cargo === 'admin' ? 'Administrador' : 'Funcionário';
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td>${cargoIcon}${cargoText}</td>
                        <td><span class="badge ${badgeClass} px-3 py-2">${badgeText}</span></td>
                        <td class="text-end">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="abrirEdicao(${u.id})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="excluirUsuario(${u.id}, '${u.username}')"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function abrirEdicao(id) {
            const u = usuariosData.find(x => x.id === id);
            document.getElementById('editId').value = u.id;
            document.getElementById('editUsernameDisplay').textContent = u.username;
            document.getElementById('editCargo').value = u.cargo;
            document.getElementById('editStatus').value = u.status;
            document.getElementById('modalTitulo').textContent = `Editar: ${u.username}`;
            new bootstrap.Modal(document.getElementById('modalEditarUsuario')).show();
        }

        async function salvarUsuario() {
            const id = document.getElementById('editId').value;
            const cargo = document.getElementById('editCargo').value;
            const status = document.getElementById('editStatus').value;
            await fetch(`/api/usuarios/${id}`, { method: 'PUT', headers, body: JSON.stringify({ cargo, status }) });
            bootstrap.Modal.getInstance(document.getElementById('modalEditarUsuario')).hide();
            carregarUsuarios();
        }

        function gerarSenhaAleatoria() {
            const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
            return Array.from({ length: 8 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        async function resetarSenha() {
            const id = document.getElementById('editId').value;
            const nova_senha = gerarSenhaAleatoria();
            await fetch(`/api/usuarios/${id}`, { method: 'PUT', headers, body: JSON.stringify({ nova_senha }) });
            bootstrap.Modal.getInstance(document.getElementById('modalEditarUsuario')).hide();
            document.getElementById('senhaGerada').textContent = nova_senha;
            new bootstrap.Modal(document.getElementById('modalSenhaReset')).show();
        }

        async function excluirUsuario(id, username) {
            if (!confirm(`Excluir o usuário "${username}" permanentemente?`)) return;
            await fetch(`/api/usuarios/${id}`, { method: 'DELETE', headers });
            carregarUsuarios();
        }

        function abrirModalNovoUsuario() {
            document.getElementById('novoUsername').value = '';
            document.getElementById('novoSenha').value = '';
            document.getElementById('novoCargo').value = 'funcionario';
            new bootstrap.Modal(document.getElementById('modalNovoUsuario')).show();
        }

        async function criarNovoUsuario() {
            const username = document.getElementById('novoUsername').value.trim();
            const password = document.getElementById('novoSenha').value.trim();
            const cargo = document.getElementById('novoCargo').value;
            if (!username || !password) return alert('Preencha usuário e senha.');
            const res = await fetch('/api/registro', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            const data = await res.json();
            if (!res.ok) return alert(data.erro);
            // Approve immediately with chosen cargo
            const users = await (await fetch('/api/usuarios', { headers })).json();
            const novo = users.find(u => u.username === username);
            if (novo) await fetch(`/api/usuarios/${novo.id}`, { method: 'PUT', headers, body: JSON.stringify({ cargo, status: 'ativo' }) });
            bootstrap.Modal.getInstance(document.getElementById('modalNovoUsuario')).hide();
            carregarUsuarios();
        }

        window.onload = carregarUsuarios;
    </script>
</body>
</html>
